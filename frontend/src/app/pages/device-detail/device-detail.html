<div *ngIf="error" style="color: darkred; margin: 8px 0;">
  {{ error }}
</div>

<div *ngIf="device">
  <h2>Device {{ device.id }} — {{ device.name }}</h2>
  <p><b>UDI:</b> {{ device.udi }}</p>
  <p><b>Version:</b> {{ device.version }}</p>
  <p><b>Status:</b> {{ device.status }}</p>
  <p *ngIf="device.createdAt"><b>Created at:</b> {{ device.createdAt }}</p>
</div>

<hr />

<h3>Add certification</h3>
<div style="display:grid; gap:8px; max-width: 420px;">
  <label>Name <input [(ngModel)]="certForm.name" /></label>
  <label>Standard <input [(ngModel)]="certForm.standard" /></label>
  <label>Expiry date <input [(ngModel)]="certForm.expiryDate" placeholder="YYYY-MM-DD" /></label>
  <button (click)="addCert()">Add</button>
</div>

<hr />

<h3>Certifications</h3>
<ul>
  <li *ngFor="let c of certs">
    {{ c.id }} — {{ c.name }} — {{ c.standard }} — exp: {{ c.expiryDate }}
    <button (click)="deleteCert(c)">Delete</button>
  </li>
</ul>
