<h2>Personnel</h2>

<div *ngIf="error" style="color: darkred; margin: 8px 0; white-space: pre-wrap;">
  {{ error }}
</div>

<h3>Create personnel</h3>
<div style="display:grid; gap:8px; max-width: 420px;">
  <label>Name <input [(ngModel)]="form.name" /></label>

  <label>Role
    <select [(ngModel)]="form.role">
      <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
    </select>
  </label>

  <label>Email <input [(ngModel)]="form.email" /></label>

  <label>Team
    <select [(ngModel)]="form.teamId">
      <option [ngValue]="null">No team</option>
      <option *ngFor="let t of teams" [ngValue]="t.id">{{ t.name }}</option>
    </select>
  </label>

  <button (click)="create()">Create</button>
</div>

<hr />

<h3>Personnel list</h3>
<ul>
  <li *ngFor="let p of personnel">
    {{ p.id }} — {{ p.name }} <span *ngIf="p.role">({{ p.role }})</span>
    <span *ngIf="p.email"> — {{ p.email }}</span>
    <span *ngIf="p.teamId != null"> — teamId: {{ p.teamId }}</span>
  </li>
</ul>
