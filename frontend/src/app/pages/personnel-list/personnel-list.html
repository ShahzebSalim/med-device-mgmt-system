<!-- Page Header -->
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Personnel</h1>
    <p class="text-sm text-gray-500 mt-1">Manage your team members and roles</p>
  </div>
  <button (click)="showForm = !showForm"
    class="inline-flex items-center gap-2 px-4 py-2 bg-blue-700 text-white text-sm font-medium rounded-lg hover:bg-blue-800 transition-colors shadow-sm">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
    </svg>
    Add Personnel
  </button>
</div>

<!-- Error Alert -->
<div *ngIf="error" class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-800 rounded-lg p-4 mb-6">
  <svg class="h-5 w-5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="10" /><path stroke-linecap="round" d="M12 8v4m0 4h.01" />
  </svg>
  <span class="text-sm whitespace-pre-wrap">{{ error }}</span>
</div>

<!-- Create Form -->
<div *ngIf="showForm" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
  <h2 class="text-lg font-semibold text-gray-800 mb-4">New Personnel</h2>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
      <input [(ngModel)]="form.name" placeholder="e.g. Jane Smith"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input [(ngModel)]="form.email" type="email" placeholder="e.g. jane@example.com"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
      <select [(ngModel)]="form.role"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Team</label>
      <select [(ngModel)]="form.teamId"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option [ngValue]="null">No team</option>
        <option *ngFor="let t of teams" [ngValue]="t.id">{{ t.name }}</option>
      </select>
    </div>
  </div>
  <div class="flex gap-3 mt-4">
    <button (click)="create()"
      class="px-4 py-2 bg-blue-700 text-white text-sm font-medium rounded-lg hover:bg-blue-800 transition-colors">
      Save Personnel
    </button>
    <button (click)="showForm = false"
      class="px-4 py-2 bg-gray-100 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-200 transition-colors">
      Cancel
    </button>
  </div>
</div>

<!-- Search Bar -->
<div class="relative mb-4">
  <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24"
    stroke="currentColor" stroke-width="2">
    <circle cx="11" cy="11" r="8" /><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35" />
  </svg>
  <input [(ngModel)]="search" (ngModelChange)="applySearch()" placeholder="Search by name, role or email…"
    class="w-full border border-gray-300 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
</div>

<!-- Loading State -->
<div *ngIf="loading" class="flex justify-center items-center py-16">
  <svg class="animate-spin h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
  </svg>
</div>

<!-- Personnel Table -->
<div *ngIf="!loading" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Name</th>
        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Role</th>
        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</th>
        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Team</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      <tr *ngFor="let p of filtered" class="hover:bg-gray-50 transition-colors">
        <td class="px-6 py-4">
          <div class="flex items-center gap-3">
            <div class="h-8 w-8 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-sm font-semibold">
              {{ p.name.charAt(0).toUpperCase() }}
            </div>
            <span class="text-sm font-semibold text-gray-900">{{ p.name }}</span>
          </div>
        </td>
        <td class="px-6 py-4">
          <span *ngIf="p.role" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
            [ngClass]="roleClass(p.role)">
            {{ p.role }}
          </span>
          <span *ngIf="!p.role" class="text-sm text-gray-400">—</span>
        </td>
        <td class="px-6 py-4">
          <span class="text-sm text-gray-600">{{ p.email || '—' }}</span>
        </td>
        <td class="px-6 py-4">
          <span class="text-sm text-gray-600">{{ teamName(p.teamId) }}</span>
        </td>
      </tr>
      <tr *ngIf="filtered.length === 0">
        <td colspan="4" class="px-6 py-12 text-center text-sm text-gray-400">No personnel found.</td>
      </tr>
    </tbody>
  </table>
</div>
