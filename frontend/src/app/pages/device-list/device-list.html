<!-- Page Header -->
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Medical Devices</h1>
    <p class="text-sm text-gray-500 mt-1">Manage your device catalogue</p>
  </div>
  <button (click)="showForm = !showForm"
    class="inline-flex items-center gap-2 px-4 py-2 bg-blue-700 text-white text-sm font-medium rounded-lg hover:bg-blue-800 transition-colors shadow-sm">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
    </svg>
    Add Device
  </button>
</div>

<!-- Error Alert -->
<div *ngIf="error" class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-800 rounded-lg p-4 mb-6">
  <svg class="h-5 w-5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="10" /><path stroke-linecap="round" d="M12 8v4m0 4h.01" />
  </svg>
  <span class="text-sm">{{ error }}</span>
</div>

<!-- Create Device Form -->
<div *ngIf="showForm" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
  <h2 class="text-lg font-semibold text-gray-800 mb-4">New Device</h2>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Device Name *</label>
      <input [(ngModel)]="form.name" placeholder="e.g. Pulse Oximeter Pro"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">UDI *</label>
      <input [(ngModel)]="form.udi" placeholder="e.g. 00123456789012"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Version</label>
      <input [(ngModel)]="form.version" placeholder="e.g. 2.1.0"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
      <select [(ngModel)]="form.status"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="ACTIVE">Active</option>
        <option value="INACTIVE">Inactive</option>
      </select>
    </div>
  </div>
  <div class="flex gap-3 mt-4">
    <button (click)="create()"
      class="px-4 py-2 bg-blue-700 text-white text-sm font-medium rounded-lg hover:bg-blue-800 transition-colors">
      Save Device
    </button>
    <button (click)="showForm = false"
      class="px-4 py-2 bg-gray-100 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-200 transition-colors">
      Cancel
    </button>
  </div>
</div>

<!-- Search Bar -->
<div class="relative mb-4">
  <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24"
    stroke="currentColor" stroke-width="2">
    <circle cx="11" cy="11" r="8" /><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35" />
  </svg>
  <input [(ngModel)]="search" (ngModelChange)="applySearch()" placeholder="Search by name, UDI or version…"
    class="w-full border border-gray-300 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
</div>

<!-- Loading State -->
<div *ngIf="loading" class="flex justify-center items-center py-16">
  <svg class="animate-spin h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
  </svg>
</div>

<!-- Device Table -->
<div *ngIf="!loading" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Device</th>
        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">UDI</th>
        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Version</th>
        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      <tr *ngFor="let d of filtered" class="hover:bg-gray-50 transition-colors">
        <td class="px-6 py-4">
          <span class="text-sm font-semibold text-gray-900">{{ d.name }}</span>
        </td>
        <td class="px-6 py-4">
          <span class="text-sm text-gray-600 font-mono">{{ d.udi }}</span>
        </td>
        <td class="px-6 py-4">
          <span class="text-sm text-gray-600">{{ d.version || '—' }}</span>
        </td>
        <td class="px-6 py-4">
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
            [ngClass]="statusClass(d.status)">
            {{ d.status }}
          </span>
        </td>
        <td class="px-6 py-4">
          <button (click)="open(d)"
            class="text-blue-600 hover:text-blue-800 text-sm font-medium transition-colors">
            View details →
          </button>
        </td>
      </tr>
      <tr *ngIf="filtered.length === 0 && !loading">
        <td colspan="5" class="px-6 py-12 text-center text-sm text-gray-400">
          No devices found.
        </td>
      </tr>
    </tbody>
  </table>
</div>
