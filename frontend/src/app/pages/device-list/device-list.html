<h2>Devices</h2>

<div *ngIf="error" style="color: darkred; margin: 8px 0;">
  {{ error }}
</div>

<h3>Create device</h3>
<div style="display:grid; gap:8px; max-width: 420px;">
  <label>Name <input [(ngModel)]="form.name" /></label>
  <label>UDI <input [(ngModel)]="form.udi" /></label>
  <label>Version <input [(ngModel)]="form.version" /></label>
  <label>Status <input [(ngModel)]="form.status" /></label>
  <button (click)="create()">Create</button>
</div>

<hr />

<h3>Device list</h3>
<ul>
  <li *ngFor="let d of devices">
    <button (click)="open(d)">Open</button>
    {{ d.id }} — {{ d.name }} (UDI: {{ d.udi }}) — {{ d.status }}
  </li>
</ul>
